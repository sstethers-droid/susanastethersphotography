<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Sign in | Susana Stethers Photography</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prata&family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">
<main class="login-shell">
  <a class="admin-brand" href="/">Susana Stethers <span>Photography</span></a>

  <section class="login-card">
    <h1>Sign in</h1>

    <form id="login-form" class="admin-form">
      <label>
        <span>Email</span>
        <input id="login-email" type="email" required autocomplete="username" autofocus>
      </label>
      <label>
        <span>Password</span>
        <input id="login-password" type="password" required autocomplete="current-password">
      </label>
      <p class="admin-message" id="login-message" hidden role="alert"></p>
      <button class="btn" type="submit" id="login-submit">Sign in</button>
    </form>
  </section>
</main>

<script src="js/config.js"></script>
<script src="js/supabase-2.57.4.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
