<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Owner Login | Susana Stethers Photography</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">
<main class="login-shell">
  <a class="admin-brand" href="/">Susana Stethers <span>Photography</span></a>
  <section class="login-card">
    <p class="eyebrow">Private owner portal</p>
    <h1>Welcome back</h1>
    <p>Sign in to manage your website photos and client inquiries.</p>
    <form id="login-form" class="admin-form">
      <label><span>Email</span><input id="login-email" type="email" value="susanastethersphotography@gmail.com" required autocomplete="username"></label>
      <label><span>Password</span><input id="login-password" type="password" required minlength="8" autocomplete="current-password"></label>
      <p class="admin-message" id="login-message" hidden></p>
      <button class="btn" type="submit">Sign in</button>
    </form>
    <div class="login-actions">
      <button type="button" class="btn-text" id="forgot-password">Forgot password?</button>
      <button type="button" class="btn-text" id="create-account">First time? Create owner account</button>
    </div>
  </section>
</main>
<script src="js/config.js"></script>
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.57.4/+esm';
  window.supabase = { createClient };
  await import('./js/admin.js');
</script>
</body>
</html>
